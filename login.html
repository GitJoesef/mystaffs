<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In — TeacherTime</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;">
    <div class="card" style="width:100%;max-width:28rem;padding:2.5rem 2rem;">

        <div style="text-align:center;margin-bottom:2rem;">
            <div style="display:flex; justify-content:flex-start; margin-bottom:1.5rem;">
                <a href="landing.html" class="btn btn-secondary" style="display:inline-flex; align-items:center; gap:0.5rem; text-decoration:none; padding:0.5rem 0.75rem; font-size:0.875rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    Back to Home
                </a>
            </div>
            <h1 style="font-size:1.5rem;font-weight:700;">Welcome back</h1>
            <p class="text-muted" style="font-size:0.875rem;">Sign in to your TeacherTime account</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div id="error-msg"
                style="color:hsl(var(--destructive));font-size:0.875rem;display:none;text-align:center;"></div>

            <div>
                <label style="display:block;font-size:0.875rem;font-weight:500;margin-bottom:0.5rem;">School
                    Name</label>
                <input id="school_name" type="text" class="input" required placeholder="Springfield High School" />
            </div>

            <div>
                <label style="display:block;font-size:0.875rem;font-weight:500;margin-bottom:0.5rem;">Email
                    address</label>
                <input id="email" type="email" class="input" required
                    placeholder="admin@mystaff.app OR staff@mystaff.app" />
            </div>

            <div>
                <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.5rem;">
                    <label style="display:block;font-size:0.875rem;font-weight:500;">Password</label>
                    <a href="forgot-password.html"
                        style="font-size:0.75rem;color:hsl(var(--primary));text-decoration:none;">Forgot password?</a>
                </div>
                <input id="password" type="password" class="input" required placeholder="password123" />
            </div>

            <button type="submit" class="btn btn-primary w-full" style="margin-top:1.5rem;">Sign In</button>
        </form>

        <div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid hsl(var(--border)); text-align:center;">
            <p class="text-muted" style="font-size:0.875rem; margin-bottom:1rem; font-weight:500;">Test Accounts (Auto-Login)</p>
            <div class="grid grid-4 gap-2" style="font-size:0.75rem; margin-bottom:0.75rem;">
                <button type="button" class="btn btn-secondary" style="padding:0.4rem;" onclick="autoLogin('admin1@demo.com')">Admin 1</button>
                <button type="button" class="btn btn-secondary" style="padding:0.4rem;" onclick="autoLogin('admin2@demo.com')">Admin 2</button>
                <button type="button" class="btn btn-secondary" style="padding:0.4rem;" onclick="autoLogin('admin3@demo.com')">Admin 3</button>
                <button type="button" class="btn btn-secondary" style="padding:0.4rem;" onclick="autoLogin('admin4@demo.com')">Admin 4</button>
            </div>
            <div class="grid grid-4 gap-2" style="font-size:0.75rem;">
                <button type="button" class="btn btn-secondary" style="padding:0.4rem;" onclick="autoLogin('staff1@demo.com')">Staff 1</button>
                <button type="button" class="btn btn-secondary" style="padding:0.4rem;" onclick="autoLogin('staff2@demo.com')">Staff 2</button>
                <button type="button" class="btn btn-secondary" style="padding:0.4rem;" onclick="autoLogin('staff3@demo.com')">Staff 3</button>
                <button type="button" class="btn btn-secondary" style="padding:0.4rem;" onclick="autoLogin('staff4@demo.com')">Staff 4</button>
            </div>
        </div>

        <div style="text-align:center;margin-top:2rem;font-size:0.875rem;">
            <span class="text-muted">Don't have an account?</span>
            <a href="signup.html"
                style="color:hsl(var(--primary));text-decoration:none;font-weight:500;margin-left:0.5rem;">Sign up</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js?v=2"></script>
    <script src="js/theme.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script>
        initTheme(); // Applies dark mode if saved in local storage

        function autoLogin(email) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = 'password';
            document.getElementById('school_name').value = 'TeacherTime School';
            document.getElementById('login-form').requestSubmit();
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const err = document.getElementById('error-msg');

            btn.textContent = 'Signing in...';
            btn.disabled = true;
            err.style.display = 'none';

            const school_name = document.getElementById('school_name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const r = await api('/api/login', { method: 'POST', body: { school_name, email, password } });

            if (r.ok) {
                localStorage.setItem('staffsync_token', r.body.token);
                location.href = 'index.html?v=' + Date.now();
            } else {
                err.textContent = r.body.error || 'Login failed';
                err.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
