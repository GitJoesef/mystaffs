<!doctype html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
    <title>TeacherTime Kiosk</title>
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        body {
            background-color: hsl(var(--background));
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none; /* Prevent selection on touch screens */
        }
        .kiosk-header {
            padding: 1.5rem 2rem;
            background: hsl(var(--card));
            border-bottom: 1px solid hsl(var(--border));
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .clock {
            font-size: 2.5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: hsl(var(--foreground));
        }
        .date {
            font-size: 1.25rem;
            color: hsl(var(--muted-foreground));
            font-weight: 500;
        }
        .kiosk-main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        .staff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }
        .staff-card {
            background: hsl(var(--card));
            border: 1px solid hsl(var(--card-border));
            border-radius: 1rem;
            padding: 1.5rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .staff-card:active {
            transform: scale(0.96);
        }
        .staff-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            object-fit: cover;
            border: 3px solid hsl(var(--primary) / 0.2);
        }
        .staff-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: hsl(var(--foreground));
        }
        .staff-role {
            font-size: 0.85rem;
            color: hsl(var(--muted-foreground));
            margin-top: 0.25rem;
        }
        
        /* PIN Modal */
        .pin-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
        }
        .pin-card {
            background: hsl(var(--card));
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        .pin-modal.active .pin-card {
            transform: translateY(0);
            opacity: 1;
        }
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }
        .num-btn {
            background: hsl(var(--muted));
            border: none;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            font-size: 1.75rem;
            font-weight: 600;
            color: hsl(var(--foreground));
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .num-btn:active {
            background: hsl(var(--primary) / 0.2);
            color: hsl(var(--primary));
        }
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: hsl(var(--border));
            transition: background 0.2s;
        }
        .pin-dot.filled {
            background: hsl(var(--primary));
        }
        .action-btns {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .action-btns button {
            flex: 1;
            padding: 1rem;
            font-size: 1.1rem;
        }
        
        /* Fullscreen Prompt */
        #school-prompt {
            position: fixed;
            inset: 0;
            background: hsl(var(--background));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
    </style>
</head>
<body>

    <!-- School Prompt (if no school set) -->
    <div id="school-prompt" style="display:none;">
        <div class="card" style="padding:2rem; width:100%; max-width:400px; text-align:center;">
            <h2 style="font-size:1.5rem; font-weight:700; margin-bottom:1rem;">Kiosk Setup</h2>
            <p class="text-muted" style="margin-bottom:1.5rem;">Enter your School Name to load the staff directory.</p>
            <input id="school-input" class="input" placeholder="e.g. Springfield High" style="margin-bottom:1rem; text-align:center; font-size:1.1rem;" />
            <button onclick="setSchool()" class="btn btn-primary w-full" style="padding:1rem;">Launch Kiosk</button>
        </div>
    </div>

    <!-- Header -->
    <header class="kiosk-header">
        <div>
            <div style="display:flex; align-items:center; gap:0.75rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="hsl(var(--primary))" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                <div>
                    <h1 id="kiosk-school-name" style="font-size:1.25rem; font-weight:700; margin:0; line-height:1;">TeacherTime Kiosk</h1>
                    <div class="text-muted" style="font-size:0.85rem;">Select your name to check in or out</div>
                </div>
            </div>
        </div>
        <div style="text-align:right;">
            <div id="kiosk-clock" class="clock">12:00:00</div>
            <div id="kiosk-date" class="date">Monday, January 1</div>
        </div>
    </header>

    <!-- Main Grid -->
    <main class="kiosk-main">
        <div style="max-width:400px; margin:0 auto 2rem;">
            <input type="text" id="kiosk-search" class="input" placeholder="Search name..." style="padding:1rem 1.5rem; font-size:1.2rem; border-radius:9999px; text-align:center; box-shadow:var(--shadow-md);" oninput="filterStaff()" />
        </div>
        <div id="staff-grid" class="staff-grid">
            <!-- Staff populated here -->
        </div>
    </main>

    <!-- PIN Modal -->
    <div id="pin-modal" class="pin-modal">
        <div class="pin-card">
            <button onclick="closeModal()" style="position:absolute; top:1rem; right:1.5rem; background:none; border:none; font-size:1.5rem; cursor:pointer;" class="text-muted">&times;</button>
            <img id="modal-photo" src="" style="width:60px; height:60px; border-radius:50%; margin:0 auto 1rem; object-fit:cover;" />
            <h2 id="modal-name" style="font-size:1.5rem; font-weight:700; margin-bottom:0.25rem;">Name</h2>
            <div class="text-muted" style="margin-bottom:1rem;">Enter your 4-digit PIN</div>
            
            <div class="pin-display" id="pin-display">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>

            <div id="pin-error" style="color:hsl(var(--destructive)); font-size:0.85rem; height:1rem; margin-bottom:0.5rem;"></div>

            <div class="numpad">
                <button class="num-btn" onclick="addPin(1)">1</button>
                <button class="num-btn" onclick="addPin(2)">2</button>
                <button class="num-btn" onclick="addPin(3)">3</button>
                <button class="num-btn" onclick="addPin(4)">4</button>
                <button class="num-btn" onclick="addPin(5)">5</button>
                <button class="num-btn" onclick="addPin(6)">6</button>
                <button class="num-btn" onclick="addPin(7)">7</button>
                <button class="num-btn" onclick="addPin(8)">8</button>
                <button class="num-btn" onclick="addPin(9)">9</button>
                <button class="num-btn" onclick="clearPin()" style="background:none; color:hsl(var(--destructive));"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg></button>
                <button class="num-btn" onclick="addPin(0)">0</button>
                <div></div>
            </div>

            <div class="action-btns">
                <button onclick="submitKiosk('in')" class="btn btn-primary">Check In</button>
                <button onclick="submitKiosk('out')" class="btn btn-destructive">Check Out</button>
            </div>
        </div>
    </div>

    <!-- Success Overlay -->
    <div id="success-overlay" style="position:fixed; inset:0; background:hsl(142, 70%, 45%); z-index:300; display:none; align-items:center; justify-content:center; flex-direction:column; color:white;">
        <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:1rem; animation: pulse 2s infinite;"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <h1 id="success-message" style="font-size:3rem; font-weight:800; text-align:center;">Checked In!</h1>
        <p style="font-size:1.5rem; opacity:0.9;">Have a great day.</p>
    </div>

    <script src="js/config.js"></script>
    <script>
        let allStaff = [];
        let activeUser = null;
        let currentPin = '';

        // Live Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('kiosk-clock').textContent = now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', second:'2-digit'});
            document.getElementById('kiosk-date').textContent = now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
        }, 1000);

        function getSchoolName() {
            const urlParams = new URLSearchParams(window.location.search);
            const s = urlParams.get('school');
            if(s) {
                localStorage.setItem('kiosk_school', s);
                return s;
            }
            return localStorage.getItem('kiosk_school');
        }

        function setSchool() {
            const val = document.getElementById('school-input').value.trim();
            if(val) {
                localStorage.setItem('kiosk_school', val);
                document.getElementById('school-prompt').style.display = 'none';
                initKiosk();
            }
        }

        async function initKiosk() {
            const schoolName = getSchoolName();
            if(!schoolName) {
                document.getElementById('school-prompt').style.display = 'flex';
                return;
            }

            document.getElementById('kiosk-school-name').textContent = schoolName + ' Kiosk';

            try {
                const res = await fetch(`/api/kiosk/users?school_name=${encodeURIComponent(schoolName)}`);
                const data = await res.json();
                if(res.ok) {
                    allStaff = data.users || [];
                    renderGrid(allStaff);
                } else {
                    alert('Error loading staff: ' + data.error);
                }
            } catch (e) {
                console.error(e);
            }
        }

        function renderGrid(list) {
            const container = document.getElementById('staff-grid');
            if(list.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:3rem; color:hsl(var(--muted-foreground));">No staff found for this school.</div>';
                return;
            }

            container.innerHTML = list.map(u => `
                <div class="staff-card" onclick="openPinModal('${u.id}', '${u.name.replace(/'/g, "\\'")}', '${u.photo}')">
                    <img src="${u.photo}" class="staff-photo" />
                    <div class="staff-name">${u.name}</div>
                    <div class="staff-role">${u.role}</div>
                </div>
            `).join('');
        }

        function filterStaff() {
            const q = document.getElementById('kiosk-search').value.toLowerCase();
            const filtered = allStaff.filter(u => u.name.toLowerCase().includes(q) || u.role.toLowerCase().includes(q));
            renderGrid(filtered);
        }

        function openPinModal(id, name, photo) {
            activeUser = id;
            currentPin = '';
            updatePinDots();
            document.getElementById('pin-error').textContent = '';
            document.getElementById('modal-name').textContent = name;
            document.getElementById('modal-photo').src = photo;
            
            const modal = document.getElementById('pin-modal');
            modal.style.display = 'flex';
            // slight delay to allow display block to apply before adding class for transition
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('pin-modal');
            modal.classList.remove('active');
            setTimeout(() => { modal.style.display = 'none'; activeUser = null; }, 300);
        }

        function addPin(num) {
            if(currentPin.length < 4) {
                currentPin += num;
                updatePinDots();
                document.getElementById('pin-error').textContent = '';
            }
        }

        function clearPin() {
            currentPin = '';
            updatePinDots();
        }

        function updatePinDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, index) => {
                if(index < currentPin.length) dot.classList.add('filled');
                else dot.classList.remove('filled');
            });
        }

        async function submitKiosk(type) {
            if(currentPin.length < 4) {
                document.getElementById('pin-error').textContent = 'Please enter a 4-digit PIN.';
                return;
            }

            try {
                const res = await fetch(`/api/kiosk/check${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeUser, pin: currentPin })
                });
                
                const data = await res.json();
                
                if(res.ok) {
                    closeModal();
                    showSuccess(data.message || 'Success!');
                } else {
                    document.getElementById('pin-error').textContent = data.error || 'Check-in failed.';
                    clearPin();
                }
            } catch (e) {
                document.getElementById('pin-error').textContent = 'Network error. Please try again.';
                clearPin();
            }
        }

        function showSuccess(msg) {
            const overlay = document.getElementById('success-overlay');
            document.getElementById('success-message').textContent = msg;
            
            if(msg.toLowerCase().includes('late')) {
                overlay.style.background = 'hsl(35, 90%, 50%)'; // Orange for late
            } else if (msg.toLowerCase().includes('out')) {
                overlay.style.background = 'hsl(215, 85%, 45%)'; // Blue for out
            } else {
                overlay.style.background = 'hsl(142, 70%, 40%)'; // Green for normal in
            }

            overlay.style.display = 'flex';
            
            // clear search filter
            document.getElementById('kiosk-search').value = '';
            filterStaff();

            setTimeout(() => {
                overlay.style.display = 'none';
            }, 3000);
        }

        // Init
        initKiosk();
    </script>
</body>
</html>
