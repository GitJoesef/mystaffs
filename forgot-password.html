<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recover Password — TeacherTime</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;">
    <div class="card" style="width:100%;max-width:28rem;padding:2.5rem 2rem;">

        <div style="text-align:center;margin-bottom:2rem;">
            <a href="login.html"
                style="display:inline-flex;align-items:center;gap:0.5rem;text-decoration:none;color:hsl(var(--primary));margin-bottom:1.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
            </a>
            <h1 style="font-size:1.5rem;font-weight:700;">Recover Password</h1>
            <p class="text-muted" style="font-size:0.875rem;">Reset your password using your School Name</p>
        </div>

        <form id="recover-form" class="space-y-4">
            <div id="error-msg"
                style="color:hsl(var(--destructive));font-size:0.875rem;display:none;text-align:center;"></div>
            <div id="success-msg" style="color:hsl(var(--primary));font-size:0.875rem;display:none;text-align:center;">
            </div>

            <div>
                <label style="display:block;font-size:0.875rem;font-weight:500;margin-bottom:0.5rem;">School
                    Name</label>
                <input id="school_name" type="text" class="input" required placeholder="Springfield High School" />
            </div>

            <div>
                <label style="display:block;font-size:0.875rem;font-weight:500;margin-bottom:0.5rem;">Email
                    address</label>
                <input id="email" type="email" class="input" required placeholder="admin@mystaff.app" />
            </div>

            <div>
                <label style="display:block;font-size:0.875rem;font-weight:500;margin-bottom:0.5rem;">New
                    Password</label>
                <input id="new_password" type="password" class="input" required minlength="6"
                    placeholder="password123" />
            </div>

            <button type="submit" class="btn btn-primary w-full" style="margin-top:1.5rem;">Reset Password</button>
        </form>

        <div style="text-align:center;margin-top:2rem;font-size:0.875rem;">
            <a href="login.html"
                style="color:hsl(var(--primary));text-decoration:none;font-weight:500;margin-left:0.5rem;">Back to Sign
                In</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js?v=3"></script>
    <script src="js/theme.js?v=3"></script>
    <script src="js/api.js?v=3"></script>
    <script>
        initTheme(); // Applies dark mode if saved in local storage

        document.getElementById('recover-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const err = document.getElementById('error-msg');
            const success = document.getElementById('success-msg');

            btn.textContent = 'Resetting...';
            btn.disabled = true;
            err.style.display = 'none';
            success.style.display = 'none';

            const school_name = document.getElementById('school_name').value;
            const email = document.getElementById('email').value;
            const new_password = document.getElementById('new_password').value;

            const r = await api('/api/recover-password', { method: 'POST', body: { school_name, email, new_password } });

            if (r.ok) {
                success.textContent = r.body.message || 'Password reset successfully! Redirecting...';
                success.style.display = 'block';
                setTimeout(() => {
                    location.href = 'login.html?reset=true';
                }, 1500);
            } else {
                err.textContent = r.body.error || 'Recovery failed';
                err.style.display = 'block';
                btn.textContent = 'Reset Password';
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
