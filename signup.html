<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Up — TeacherTime</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;">
    <div class="card" style="width:100%;max-width:28rem;padding:2.5rem 2rem;">

        <div style="text-align:center;margin-bottom:2rem;">
            <a href="landing.html"
                style="display:inline-flex;align-items:center;gap:0.5rem;text-decoration:none;color:hsl(var(--primary));margin-bottom:1.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
            </a>
            <h1 id="signup-title" style="font-size:1.5rem;font-weight:700;">Create an account</h1>
            <p id="signup-subtitle" class="text-muted" style="font-size:0.875rem;">Get started with TeacherTime</p>
        </div>

        <!-- Step 1: Role Selection -->
        <div id="step-1" class="space-y-4">
            <button type="button" class="btn btn-secondary w-full" style="padding:1.5rem; display:flex; flex-direction:column; align-items:center; height:auto; gap:0.5rem;" onclick="selectRole('Admin')">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:hsl(var(--primary));"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><polyline points="16 11 18 13 22 9"></polyline></svg>
                <div style="font-weight:600; font-size:1rem;">Sign up as Admin</div>
                <div class="text-muted" style="font-size:0.75rem; font-weight:normal; white-space:normal;">Manage the school, view analytics, and track staff attendance.</div>
            </button>
            
            <button type="button" class="btn btn-secondary w-full" style="padding:1.5rem; display:flex; flex-direction:column; align-items:center; height:auto; gap:0.5rem;" onclick="selectRole('Staff')">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:hsl(var(--primary));"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <div style="font-weight:600; font-size:1rem;">Sign up as Staff</div>
                <div class="text-muted" style="font-size:0.75rem; font-weight:normal; white-space:normal;">Check in/out and view your personal attendance history.</div>
            </button>
            
            <div style="text-align:center;margin-top:2rem;font-size:0.875rem;">
                <span class="text-muted">Already have an account?</span>
                <a href="login.html"
                    style="color:hsl(var(--primary));text-decoration:none;font-weight:500;margin-left:0.5rem;">Sign in</a>
            </div>
        </div>

        <!-- Step 2: Form -->
        <form id="signup-form" class="space-y-4" style="display:none;">
            <div id="error-msg"
                style="color:hsl(var(--destructive));font-size:0.875rem;display:none;text-align:center;"></div>

            <div>
                <label style="display:block;font-size:0.875rem;font-weight:500;margin-bottom:0.5rem;">School
                    Name</label>
                <input id="school_name" type="text" class="input" required placeholder="Springfield High School" />
            </div>

            <div>
                <label style="display:block;font-size:0.875rem;font-weight:500;margin-bottom:0.5rem;">Full Name</label>
                <input id="name" type="text" class="input" required placeholder="John Doe" />
            </div>

            <div>
                <label style="display:block;font-size:0.875rem;font-weight:500;margin-bottom:0.5rem;">Email
                    address</label>
                <input id="email" type="email" class="input" required placeholder="john@example.com" />
            </div>

            <div>
                <label style="display:block;font-size:0.875rem;font-weight:500;margin-bottom:0.5rem;">Password</label>
                <input id="password" type="password" class="input" required minlength="6"
                    placeholder="Create a password" />
            </div>

            <input type="hidden" id="role" value="Staff" />

            <div class="flex gap-2" style="margin-top:1.5rem;">
                <button type="button" class="btn btn-secondary w-full" onclick="showStep1()">Back</button>
                <button type="submit" class="btn btn-primary w-full">Create account</button>
            </div>
        </form>

    <!-- Scripts -->
    <script src="js/config.js?v=2"></script>
    <script src="js/theme.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script>
        initTheme(); // Applies dark mode if saved in local storage

        function selectRole(selectedRole) {
            document.getElementById('role').value = selectedRole;
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('signup-form').style.display = 'block';
            
            document.getElementById('signup-title').textContent = selectedRole === 'Admin' ? 'Register School Admin' : 'Register Staff Member';
            document.getElementById('signup-subtitle').textContent = 'Enter your details below';
        }

        function showStep1() {
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('step-1').style.display = 'block';
            document.getElementById('signup-title').textContent = 'Create an account';
            document.getElementById('signup-subtitle').textContent = 'Get started with TeacherTime';
            document.getElementById('error-msg').style.display = 'none';
        }

        document.getElementById('signup-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const err = document.getElementById('error-msg');

            btn.textContent = 'Creating account...';
            btn.disabled = true;
            err.style.display = 'none';

            const school_name = document.getElementById('school_name').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            const r = await api('/api/signup', { method: 'POST', body: { name, email, password, role, school_name } });

            if (r.ok) {
                localStorage.setItem('staffsync_token', r.body.token);
                location.href = 'index.html?v=' + Date.now();
            } else {
                err.textContent = r.body.error || 'Signup failed';
                err.style.display = 'block';
                btn.textContent = 'Create account';
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
